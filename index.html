<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИИО РБ - Автоматизация аналитической информации учреждений образования</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Подключение шрифтов -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Подключение Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Подключение библиотек для отчетов и графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <!-- Индикатор загрузки -->
    <div id="loader" class="loader-overlay">
        <div class="loader">
            <div class="loader-spinner"></div>
            <p>Загрузка данных...</p>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="notifications" class="notifications-container"></div>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Модальное окно</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Содержимое модального окна -->
            </div>
            <div id="modalFooter" class="modal-footer">
                <!-- Кнопки модального окна -->
            </div>
        </div>
    </div>

    <!-- Основная структура -->
    <div id="app" class="app-container">
        <!-- Сайдбар (боковая панель) -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h1>АИИО РБ</h1>
                <p>Автоматизация образования</p>
            </div>
            <nav class="sidebar-nav">
                <ul id="navMenu">
                    <!-- Меню будет заполнено JavaScript -->
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span id="currentUserName">Пользователь</span>
                    <button onclick="logout()" class="btn-logout">Выход</button>
                </div>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <!-- Верхняя панель -->
            <header class="top-bar">
                <button id="menuToggle" class="menu-toggle" onclick="toggleSidebar()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="search-box">
                    <input type="text" id="globalSearch" placeholder="Поиск по системе..." onkeyup="handleGlobalSearch(event)">
                    <button onclick="performGlobalSearch()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="M21 21l-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                <div class="top-bar-actions">
                    <button id="notificationsBtn" class="icon-btn" onclick="showNotifications()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span id="notificationBadge" class="badge">0</span>
                    </button>
                    <button class="icon-btn" onclick="showProfileSettings()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Контент страницы -->
            <div id="pageContent" class="page-content">
                <!-- Здесь будет отображаться контент различных страниц -->
            </div>
        </main>
    </div>

    <!-- Страница входа -->
    <div id="loginPage" class="login-page">
        <div class="login-container">
            <div class="login-header">
                <h1>АИИО РБ</h1>
                <p>Автоматизация аналитической информации учреждений образования Республики Беларусь</p>
            </div>
            <div class="login-form-container">
                <div class="login-tabs">
                    <button class="tab-btn active" onclick="showLoginTab('login')">Вход</button>
                    <button class="tab-btn" onclick="showLoginTab('register')">Регистрация</button>
                </div>
                
                <!-- Форма входа -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required placeholder="Введите email">
                        <span class="error-message" id="loginEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль</label>
                        <input type="password" id="loginPassword" required placeholder="Введите пароль">
                        <span class="error-message" id="loginPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="rememberMe"> Запомнить меня
                        </label>
                    </div>
                    <button type="submit" class="btn-primary">Войти</button>
                </form>

                <!-- Форма регистрации -->
                <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">ФИО</label>
                        <input type="text" id="registerName" required placeholder="Введите ФИО">
                        <span class="error-message" id="registerNameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" required placeholder="Введите email">
                        <span class="error-message" id="registerEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Пароль</label>
                        <input type="password" id="registerPassword" required placeholder="Придумайте пароль">
                        <span class="error-message" id="registerPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerConfirmPassword">Подтверждение пароля</label>
                        <input type="password" id="registerConfirmPassword" required placeholder="Повторите пароль">
                        <span class="error-message" id="registerConfirmPasswordError"></span>
                    </div>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Подключение скриптов -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/make-admin.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/institutions.js"></script>
    <script src="js/pages/students.js"></script>
    <script src="js/pages/staff.js"></script>
    <script src="js/pages/statistics.js"></script>
    <script src="js/pages/reports.js"></script>
    <script src="js/pages/import.js"></script>
    <script src="js/pages/settings.js"></script>
    <script src="js/pages/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
